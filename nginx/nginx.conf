events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript;

    # Docker's internal DNS — resolves service names dynamically at request time
    # This prevents startup failures if upstream containers aren't ready yet
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Web Dashboard
        location / {
            set $web_upstream http://web-ui:5173;
            proxy_pass $web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # API endpoints — pass full URI as-is (api-gateway handles /api/ prefix)
        location /api/ {
            set $api_upstream http://api-gateway:8000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_pass_request_headers on;
        }

        # Health check
        location /health {
            set $api_upstream http://api-gateway:8000;
            proxy_pass $api_upstream;
            proxy_set_header Origin $http_origin;
            access_log off;
        }

        # MinIO S3 API — strip /minio/ prefix before proxying
        location /minio/ {
            rewrite ^/minio/(.*) /$1 break;
            set $minio_s3 http://minio:9000;
            proxy_pass $minio_s3;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
            proxy_buffering off;
            proxy_request_buffering off;
            client_max_body_size 100M;
        }

        # MinIO Console — strip /minio-console/ prefix before proxying
        location /minio-console/ {
            rewrite ^/minio-console/(.*) /$1 break;
            set $minio_console http://minio:9001;
            proxy_pass $minio_console;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-NginX-Proxy true;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }
    }
}